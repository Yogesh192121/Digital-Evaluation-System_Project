{% extends "base.html" %}
{% block content %}

<h3>Search & Filter</h3>

<form method="GET">

    <input type="text" name="search" placeholder="Search course">

    <select name="department">
        <option value="">All Departments</option>
        {% for d in departments %}
        <option value="{{ d.department }}">{{ d.department }}</option>
        {% endfor %}
    </select>

    <button>Apply</button>

</form>

<br>

<h3>Bulk Upload</h3>

<form method="POST" action="/bulk_upload_courses" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button>Upload CSV</button>
</form>

<br>

<h2>Manage Courses</h2>

<form method="POST">
    <input name="course_name" placeholder="Course Name" required>
    <input name="course_code" placeholder="Course Code" required>
    <select name="department">
        {% for d in departments %}
        <option value="{{ d.department }}">{{ d.department }}</option>
        {% endfor %}
    </select>
    <button>Add Course</button>

</form>

<br>

<table border="1">
    <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Department</th>
        <th>Action</th>
    </tr>

    {% for c in courses %}
    <tr>
        <td>{{ c.course_code }}</td>
        <td>{{ c.course_name }}</td>
        <td>{{ c.department }}</td>
        <td>
            <a href="/edit_course/{{ c.id }}">Edit</a> |
            <a href="/delete_course/{{ c.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
