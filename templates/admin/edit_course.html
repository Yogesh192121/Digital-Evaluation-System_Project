{% extends "base.html" %}
{% block content %}

<h2>Edit Course</h2>

<form method="POST">

    <label>Course Name</label>
    <input type="text" name="course_name" value="{{ course.course_name }}" required><br><br>

    <label>Course Code</label>
    <input type="text" name="course_code" value="{{ course.course_code }}" required><br><br>

    <label>Department</label>
    <input type="text" name="department" value="{{ course.department }}" required><br><br>

    <button type="submit">Update Course</button>

</form>

<br>
<a href="/manage_courses">⬅ Back</a>

{% endblock %}
