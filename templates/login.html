<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Government Polytechnic Nagpur – Digital Evaluation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:url("{{ url_for('static', filename='gpn-building.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            font-family: "Segoe UI", sans-serif;
            margin: 0;
        }

        .main-card {
            max-width: 1100px;
            margin: 40px auto;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
            background: rgba(255, 255, 255, 0.95);
            display: flex;
        }

        .left-panel {
            color: white;
            padding: 30px;
            min-height: 520px;
            background:linear-gradient(rgba(11, 76, 138, .7), rgba(11, 76, 138, .7)),
            url("{{ url_for('static', filename='gpn-building.jpg') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }

        .header-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .digital-text {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
            margin-top: 10px;
        }

        .project-about-container {
            margin-top: 20px;
            height: 120px;
            overflow: hidden;
            position: relative;
        }

        .project-about {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
            position: absolute;
            width: 100%;
            animation: scrollText 15s linear infinite;
        }

        @keyframes scrollText {
            0% {
                top: 100%;
            }

            100% {
                top: -100%;
            }
        }

        .need-help {
            font-size: 14px;
            color: #fff;
            margin-top: auto;
        }

        .right-panel {
            padding: 45px;
            background: rgba(255, 255, 255, 0.95);
            flex: 1;
        }

        .form-control {
            height: 46px;
            border-radius: 8px;
        }

        .btn-login,
        .btn-signup {
            height: 46px;
            border: none;
            color: #fff;
        }

        .btn-login {
            background: #1e88e5;
        }

        .btn-signup {
            background: #43a047;
        }

        .reset-password {
            font-size: 14px;
            display: block;
            margin-top: 5px;
            color: #1e88e5;
            text-decoration: none;
        }

        #signupForm {
            display: none;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row main-card">

            <!-- LEFT PANEL -->
            <div class="col-md-5 left-panel">
                <div class="header-block">
                    <img src="{{ url_for('static', filename='gpn-logo.png') }}" class="logo">
                    <div>
                        <h5>Government Polytechnic, Sadar, Nagpur</h5>
                        <p>An Autonomous Institute of Government of Maharashtra</p>
                    </div>
                </div>
                <h6 class="digital-text">Digital Evaluation System</h6>
                <div class="project-about-container">
                    <div class="project-about">Developed by Computer Department.</div>
                </div>
                <div class="need-help">📞 Need Help?</div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-7 right-panel">

                <!-- LOGIN -->
                <div id="loginForm">
                    <form method="POST" action="{{ url_for('login') }}">

                        <h4>Login</h4>

                        <input name="username" class="form-control mb-3" placeholder="Username or Email" required>

                        <input name="password" type="password" class="form-control mb-3" placeholder="Password"
                            required>

                        <button class="btn btn-login w-100">Login</button>

                        <p class="mt-3">
                            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
                        </p>

                        <button type="button" class="btn btn-signup w-100 mt-2" onclick="showSignup()">Create
                            Account</button>

                    </form>
                </div>

                <!-- SIGNUP -->
                <div id="signupForm">
                    <form method="POST" action="{{ url_for('register') }}">

                        <h4>Register</h4>

                        <!-- ROLE -->
                        <select name="role" id="roleSelect" class="form-control mb-3" required>
                            <option disabled selected>Select Role</option>
                            <option value="faculty">Faculty</option>
                            <option value="invigilator">Invigilator</option>
                        </select>

                        <input name="name" class="form-control mb-3" placeholder="Full Name" required>

                        <!-- EMAIL -->
                        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

                        <!-- MOBILE -->
                        <input type="text" name="mobile" maxlength="10" pattern="[0-9]{10}" class="form-control mb-3"
                            placeholder="10-digit Mobile" required>

                        <!-- DEPARTMENT -->
                        <select name="department" id="departmentSelect" class="form-control mb-3" required>
                            <option disabled selected>Select Department</option>
                            {% for d in departments %}
                            <option value="{{ d.department }}">{{ d.department }}</option>
                            {% endfor %}
                        </select>

                        <!-- SUBJECTS (ONLY FOR FACULTY) -->
                        <div id="subjectSection" style="display:none;">
                            <label>Select Subjects</label>
                            <div id="subjectsBox" class="mb-2"></div>

                            <input type="text" id="courseCodes" class="form-control mb-2"
                                placeholder="Selected course codes will appear here" readonly>
                        </div>


                        <!-- HIDDEN FIELDS -->
                        <input type="hidden" name="subjects" id="subjectsField">
                        <input type="hidden" name="course_codes" id="courseCodes">

                        <!-- ADDRESS -->
                        <textarea name="address" class="form-control mb-3" placeholder="Address"></textarea>

                        <button class="btn btn-signup w-100">Register</button>

                        <button type="button" class="btn btn-login w-100 mt-2" onclick="showLogin()">Back to
                            Login</button>

                    </form>
                </div>

            </div>
        </div>

        <script>
            function showSignup() {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("signupForm").style.display = "block";
            }

            function showLogin() {
                document.getElementById("signupForm").style.display = "none";
                document.getElementById("loginForm").style.display = "block";
            }

            const subjectsByDept = {{ subjects_by_dept | tojson | safe }};
            const deptSelect = document.getElementById("departmentSelect");
            const subjectsBox = document.getElementById("subjectsBox");
            const courseCodesInput = document.getElementById("courseCodes");
            const subjectsField = document.getElementById("subjectsField");

            const roleSelect = document.getElementById("roleSelect");
            const subjectSection = document.getElementById("subjectSection");

            let selectedCodes = [];
            let selectedNames = [];

            // ROLE CHANGE → SHOW/HIDE SUBJECTS
            roleSelect.addEventListener("change", () => {
                if (roleSelect.value === "faculty") {
                    subjectSection.style.display = "block";
                } else {
                    subjectSection.style.display = "none";
                    selectedCodes = [];
                    selectedNames = [];
                    courseCodesInput.value = "";
                    subjectsField.value = "";
                }
            });

            // LOAD SUBJECTS
            deptSelect.addEventListener("change", () => {
                const dept = deptSelect.value;
                subjectsBox.innerHTML = "";
                selectedCodes = [];
                selectedNames = [];

                if (subjectsByDept[dept]) {
                    subjectsByDept[dept].forEach(sub => {

                        let div = document.createElement("div");

                        div.innerHTML = `
                    <input type="checkbox" value="${sub.code}" 
                           data-name="${sub.name}"
                           onchange="updateCourses(this)">
                    ${sub.name}
                `;

                        subjectsBox.appendChild(div);
                    });
                }
            });

            // UPDATE SUBJECTS
            function updateCourses(cb) {
                const name = cb.dataset.name;

                if (cb.checked) {
                    selectedCodes.push(cb.value);
                    selectedNames.push(name);
                } else {
                    selectedCodes = selectedCodes.filter(c => c !== cb.value);
                    selectedNames = selectedNames.filter(n => n !== name);
                }

                courseCodesInput.value = selectedCodes.join(",");
                subjectsField.value = selectedNames.join(",");
            }
        </script>

</body>

</html>
